{% extends 'base.html' %}
{% block title %}Déconnexion{% endblock %}
{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;">
  <div class="card" style="max-width:440px;width:100%;text-align:center;">
    <div style="padding:16px 0 8px;">
      <div style="width:72px;height:72px;border-radius:50%;background:rgba(239,68,68,0.1);border:2px solid rgba(239,68,68,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;">
        👋
      </div>
      <h2 style="font-size:22px;font-weight:700;margin-bottom:8px;">Déconnexion</h2>
      <p style="color:var(--text3);font-size:14px;margin-bottom:8px;">
        Bonjour <strong>{{ user.get_full_name }}</strong>, souhaitez-vous vraiment vous déconnecter ?
      </p>
      <div style="padding:10px 16px;background:var(--bg2);border-radius:8px;margin:16px 0 24px;display:inline-flex;align-items:center;gap:8px;">
        <span class="role-badge role-{{ user.role }}">{{ user.get_role_display }}</span>
        <span style="font-size:13px;color:var(--text2);">{{ user.email }}</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger" style="width:100%;justify-content:center;padding:12px;">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right:6px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Oui, me déconnecter
        </button>
      </form>
      <a href="{% url 'dashboard' %}" class="btn btn-secondary" style="width:100%;justify-content:center;padding:12px;">
        Rester connecté
      </a>
    </div>
  </div>
</div>
{% endblock %}
