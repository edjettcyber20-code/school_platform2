{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="page-header"><h1 class="page-title">{{ title }}</h1><a href="{% url 'trimester_list' %}" class="btn btn-secondary">← Retour</a></div>
<div class="card" style="max-width:500px;">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Année scolaire</label>
      <input type="text" name="school_year" class="form-input" placeholder="2024-2025" required>
    </div>
    <div class="form-group">
      <label class="form-label">Numéro</label>
      <select name="number" class="form-select">
        <option value="1">1er Trimestre</option>
        <option value="2">2ème Trimestre</option>
        <option value="3">3ème Trimestre</option>
      </select>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Date de début</label>
        <input type="date" name="start_date" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label">Date de fin</label>
        <input type="date" name="end_date" class="form-input" required>
      </div>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" name="is_active"> Trimestre actif
      </label>
    </div>
    <button type="submit" class="btn btn-primary">Créer</button>
  </form>
</div>
{% endblock %}
